<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw 认知负载监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .update-time {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #00d4ff;
        }
        .update-time .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-card h3 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .status-value { font-size: 2.5rem; font-weight: bold; }
        .status-value.high { color: #ff6b6b; }
        .status-value.medium { color: #ffd93d; }
        .status-value.low { color: #6bcf7f; }
        .load-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }
        .load-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .load-bar-fill.high { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .load-bar-fill.medium { background: linear-gradient(90deg, #ffd93d, #f39c12); }
        .load-bar-fill.low { background: linear-gradient(90deg, #6bcf7f, #27ae60); }
        .error-message {
            background: rgba(255,107,107,0.2);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-align: center;
        }
        .refresh-hint {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Claw 认知负载监控</h1>
            <div class="update-time">
                <span class="live-dot"></span>
                <span>数据更新于: <strong id="update-time">--</strong></span>
            </div>
        </header>

        <div id="error-container"></div>

        <div class="status-grid">
            <div class="status-card">
                <h3>系统负载评分</h3>
                <div class="status-value" id="score">--</div>
                <div class="load-bar"><div class="load-bar-fill" id="score-bar" style="width:0%"></div></div>
            </div>
            <div class="status-card">
                <h3>活跃会话</h3>
                <div class="status-value low" id="sessions">--</div>
            </div>
            <div class="status-card">
                <h3>CPU 使用率</h3>
                <div class="status-value" id="cpu">--</div>
                <div class="load-bar"><div class="load-bar-fill" id="cpu-bar" style="width:0%"></div></div>
            </div>
            <div class="status-card">
                <h3>内存使用率</h3>
                <div class="status-value" id="memory">--</div>
                <div class="load-bar"><div class="load-bar-fill" id="memory-bar" style="width:0%"></div></div>
            </div>
        </div>

        <div class="refresh-hint">
            页面每 5 秒自动刷新 | 最后检查: <span id="check-time">--</span>
        </div>
    </div>

    <script>
        function formatTime(ts) {
            const d = new Date(ts * 1000);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }
        function formatNow() {
            const d = new Date();
            return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }
        function getLoadClass(v) {
            return v >= 70 ? 'high' : v >= 40 ? 'medium' : 'low';
        }

        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                
                document.getElementById('update-time').textContent = formatTime(data.timestamp);
                document.getElementById('check-time').textContent = formatNow();
                
                const score = data.score || 0;
                document.getElementById('score').textContent = score + '%';
                document.getElementById('score').className = 'status-value ' + getLoadClass(score);
                document.getElementById('score-bar').style.width = score + '%';
                document.getElementById('score-bar').className = 'load-bar-fill ' + getLoadClass(score);
                
                document.getElementById('sessions').textContent = data.active_sessions || 0;
                
                const cpu = data.cpu || 0;
                document.getElementById('cpu').textContent = cpu.toFixed(1) + '%';
                document.getElementById('cpu').className = 'status-value ' + getLoadClass(cpu);
                document.getElementById('cpu-bar').style.width = Math.min(cpu, 100) + '%';
                document.getElementById('cpu-bar').className = 'load-bar-fill ' + getLoadClass(cpu);
                
                const mem = data.memory || 0;
                document.getElementById('memory').textContent = mem.toFixed(1) + '%';
                document.getElementById('memory').className = 'status-value ' + getLoadClass(mem);
                document.getElementById('memory-bar').style.width = Math.min(mem, 100) + '%';
                document.getElementById('memory-bar').className = 'load-bar-fill ' + getLoadClass(mem);
                
                document.getElementById('error-container').innerHTML = '';
            } catch (e) {
                document.getElementById('error-container').innerHTML = '<div class="error-message">⚠️ 无法读取数据: ' + e.message + '</div>';
            }
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
